<div class="modal-header bg-dark text-white">
    <h5 class="modal-title fw-bold">
        <i class="fa fa-building me-2 text-info"></i>Asignar Empresas: {{ usuario.nombre }}
    </h5>
    <button type="button" class="btn-close btn-close-white" onclick="CerrarModal()"></button>
</div>

<div class="modal-body p-4">
    <form id="form_usuario_empresas">
        <input type="hidden" name="usuario_id" value="{{ usuario.id }}">
        
        <p class="small text-muted mb-3">
            Seleccione las empresas/sucursales a las que este usuario tendrá acceso de administración.
        </p>

        <div class="row g-2 overflow-auto" style="max-height: 400px;">
            {% for e in empresas %}
            <div class="col-12">
                <div class="card border mb-2 shadow-xs hover-shadow-sm transition-all">
                    <div class="card-body py-2 px-3">
                        <div class="form-check d-flex align-items-center mb-0">
                            <input class="form-check-input me-3" type="checkbox" name="empresa_ids[]" value="{{ e.id }}" 
                                   id="emp_{{ e.id }}" {{ 'checked' if e.id in ids_asignadas else '' }}>
                            <label class="form-check-label w-100 cursor-pointer" for="emp_{{ e.id }}">
                                <div class="fw-bold text-dark">{{ e.razon_social }}</div>
                                <div class="text-muted x-small">RUT: {{ e.rut }}</div>
                            </label>
                        </div>
                    </div>
                </div>
            </div>
            {% endfor %}
            
            {% if not empresas %}
            <div class="col-12 text-center py-4">
                <i class="fa fa-exclamation-triangle text-warning fa-2x mb-2"></i>
                <p class="text-muted">No se encontraron empresas disponibles para asignar.</p>
            </div>
            {% endif %}
        </div>
    </form>
</div>

<div class="modal-footer bg-light">
    <button type="button" class="btn btn-secondary" onclick="CerrarModal()">Cancelar</button>
    <button type="button" id="btnGuardarAccesos" class="btn btn-info text-white px-4 shadow-sm" onclick="guardarAccesosUsuario()">
        <i class="fa fa-save me-1"></i> Guardar Accesos
    </button>
</div>

<script>
function guardarAccesosUsuario() {
    const $btn = $('#btnGuardarAccesos');
    const originalHtml = $btn.html();
    
    $btn.prop('disabled', true).html('<i class="fa fa-spinner fa-spin me-1"></i> Guardando...');
    $('#fondo').addClass('visible');

    const formData = $('#form_usuario_empresas').serialize();

    $.post("{{ url_for('usuario.guardar_empresas') }}", formData)
    .done(function(res) {
        if (res.ok) {
            toastr.success(res.msg);
            CerrarModal();
        } else {
            toastr.error(res.msg);
            $btn.prop('disabled', false).html(originalHtml);
        }
    })
    .fail(function() {
        toastr.error('Error de comunicación.');
        $btn.prop('disabled', false).html(originalHtml);
    })
    .always(function() {
        $('#fondo').removeClass('visible');
    });
}
</script>
