<div class="modal-header bg-primary text-white">
    <h5 class="modal-title fw-bold">Nueva Planificación</h5>
    <button type="button" class="btn-close btn-close-white" onclick="CerrarModal()" aria-label="Close"></button>
</div>

<div class="modal-body p-4">
    <form id="form_planificacion">
        <div class="row g-3">
            <div class="col-md-6">
                <label class="form-label small fw-bold text-muted"><code>(*)</code> Empresa</label>
                <select class="form-select" id="empresa" name="empresa" required>
                    <option value="">Seleccione...</option>
                    <option value="1">Empresa Petrolera S.A.</option>
                    <option value="2">Retail Express Ltda.</option>
                </select>
            </div>
            <div class="col-md-6">
                <label class="form-label small fw-bold text-muted"><code>(*)</code> Sucursal</label>
                <select class="form-select" id="sucursal" name="sucursal" required disabled>
                    <option value="">Seleccione empresa primero...</option>
                </select>
            </div>
            <div class="col-md-6">
                <label class="form-label small fw-bold text-muted"><code>(*)</code> Mes</label>
                <select class="form-select" id="mes" name="mes" required>
                    <option value="5">Mayo</option>
                    <option value="6">Junio</option>
                </select>
            </div>
            <div class="col-md-6">
                <label class="form-label small fw-bold text-muted"><code>(*)</code> Año</label>
                <input type="number" class="form-control" value="2025" id="year" name="year" required>
            </div>
            <div class="col-12 mt-4">
                <div class="form-check form-switch">
                    <input class="form-check-input" type="checkbox" id="copiarAnterior" name="copiarAnterior">
                    <label class="form-check-label" for="copiarAnterior">Copiar dotación del mes anterior</label>
                </div>
            </div>
        </div>
    </form>
</div>

<div class="modal-footer border-top-0">
    <button type="button" class="btn btn-light" onclick="CerrarModal()">Cancelar</button>
    <button type="button" class="btn btn-primary px-4" id="btn_generar">
        <i class="fa fa-magic me-2"></i> Generar Simulación
    </button>
</div>

<script>
    $(document).ready(function() {
        $('#empresa').change(function() {
            if($(this).val()) {
                $('#sucursal').prop('disabled', false).html('<option value="1">Bencinera Norte</option><option value="2">Bencinera Centro</option>');
            } else {
                $('#sucursal').prop('disabled', true).html('<option value="">Seleccione empresa primero...</option>');
            }
        });

        $('#btn_generar').click(function() {
            Swal.fire({
                title: '¿Desea generar la simulación?',
                text: "Esto procesará las reglas configuradas para la sucursal.",
                icon: 'question',
                showCancelButton: true,
                confirmButtonText: 'Sí, generar',
                cancelButtonText: 'No, revisar'
            }).then((result) => {
                if (result.isConfirmed) {
                    toastr.info('Procesando simulación...');
                    setTimeout(() => {
                        toastr.success('Simulación generada con éxito');
                        CerrarModal();
                        location.reload();
                    }, 2000);
                }
            });
        });
    });
</script>
