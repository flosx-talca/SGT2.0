<div class="modal-header bg-danger text-white">
    <h5 class="modal-title fw-bold">
        {% if modo == 'Agregar' %}Nueva Plantilla de Ausencia{% else %}Editar Plantilla de Ausencia{% endif %}
    </h5>
    <button type="button" class="btn-close btn-close-white" onclick="CerrarModal()"></button>
</div>

<div class="modal-body p-4">
    <form id="form_plantilla_ausencia">
        <input type="hidden" name="id" value="{{ registro.id if registro else 0 }}">
        
        <div class="row g-3">
            <div class="col-md-8">
                <label class="form-label small fw-bold text-muted">Nombre de Ausencia</label>
                <input type="text" class="form-control form-control-sm" name="nombre" value="{{ registro.nombre if registro else '' }}" placeholder="Ej: Vacaciones, Licencia Médica">
            </div>
            <div class="col-md-4">
                <label class="form-label small fw-bold text-muted">Abreviación</label>
                <input type="text" class="form-control form-control-sm" name="abreviacion" value="{{ registro.abreviacion if registro else '' }}" placeholder="V" maxlength="5">
            </div>

            <div class="col-md-6">
                <label class="form-label small fw-bold text-muted">Categoría</label>
                <select name="categoria" class="form-select form-select-sm">
                    {% for cat in categorias %}
                    <option value="{{ cat }}" {% if registro and registro.categoria.value == cat %}selected{% endif %}>{{ cat|capitalize }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-6">
                <label class="form-label small fw-bold text-muted">Color Visual</label>
                <input type="color" class="form-control form-control-color w-100" name="color" value="{{ registro.color if registro else '#95a5a6' }}">
            </div>

            <div class="col-md-12">
                <label class="form-label small fw-bold text-muted">Tipo de Restricción (Opcional)</label>
                <select name="tipo_restriccion" class="form-select form-select-sm">
                    <option value="">-- Ninguna --</option>
                    <option value="excluir_turno" {% if registro and registro.tipo_restriccion == 'excluir_turno' %}selected{% endif %}>Excluir Turno</option>
                    <option value="solo_turno" {% if registro and registro.tipo_restriccion == 'solo_turno' %}selected{% endif %}>Solo Turno</option>
                    <option value="turno_fijo" {% if registro and registro.tipo_restriccion == 'turno_fijo' %}selected{% endif %}>Turno Fijo</option>
                </select>
            </div>

            <div class="col-12 mt-3">
                <div class="form-check form-switch">
                    <input class="form-check-input" type="checkbox" id="activo_ausencia" {% if registro is none or registro.activo %}checked{% endif %}>
                    <label class="form-check-label fw-bold text-muted" for="activo_ausencia">Plantilla Activa</label>
                </div>
            </div>
        </div>
    </form>
</div>

<div class="modal-footer bg-light border-top-0">
    <button type="button" class="btn btn-secondary" onclick="CerrarModal()">Cancelar</button>
    <button type="button" id="btnGuardarPlantillaAusencia" class="btn btn-danger px-4 shadow-sm" onclick="guardarPlantillaAusencia()">
        <i class="fa fa-save me-1"></i> Guardar Plantilla
    </button>
</div>

<script>
function guardarPlantillaAusencia() {
    const $btn = $('#btnGuardarPlantillaAusencia');
    const originalHtml = $btn.html();
    $btn.prop('disabled', true).html('<i class="fa fa-spinner fa-spin me-1"></i> Guardando...');
    $('#fondo').addClass('visible');

    const formData = $('#form_plantilla_ausencia').serialize();
    const activo = $('#activo_ausencia').is(':checked') ? 'true' : 'false';
    const finalData = formData + '&activo=' + activo;

    $.post("{{ url_for('plantilla.guardar_ausencia') }}", finalData)
    .done(function(res) {
        if (res.ok) {
            toastr.success(res.msg);
            CerrarModal();
            refreshTablaAusencias();
        } else {
            toastr.error(res.msg);
            $btn.prop('disabled', false).html(originalHtml);
        }
    })
    .fail(function() {
        toastr.error('Error de servidor.');
        $btn.prop('disabled', false).html(originalHtml);
    })
    .always(function() { $('#fondo').removeClass('visible'); });
}
</script>
