<div class="modal-header bg-primary text-white">
    <h5 class="modal-title fw-bold">
        {% if modo == 'Agregar' %}Asignar Regla a Empresa
        {% elif modo == 'Editar' %}Editar Asignación
        {% else %}Detalle de Asignación
        {% endif %}
    </h5>
    <button type="button" class="btn-close btn-close-white" onclick="CerrarModal()"></button>
</div>

<div class="modal-body p-4">
    <form id="form_regla_empresa">
        <input type="hidden" id="id_regla_empresa" value="{{ registro.id if registro else 0 }}">
        <div class="row g-3">
            <div class="col-md-6">
                <label class="form-label small fw-bold text-muted"><code>(*)</code> Empresa</label>
                <select class="form-select {% if modo == 'Visualizar' %}bg-light{% endif %}" id="empresa_id_regla" {% if modo == 'Visualizar' %}disabled{% endif %}>
                    <option value="">Seleccione Empresa...</option>
                    {% for emp in empresas %}
                    <option value="{{ emp.id }}" {% if registro and registro.empresa_id == emp.id %}selected{% endif %}>{{ emp.razon_social }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-6">
                <label class="form-label small fw-bold text-muted"><code>(*)</code> Regla Maestra</label>
                <select class="form-select {% if modo == 'Visualizar' %}bg-light{% endif %}" id="regla_id_regla" {% if modo == 'Visualizar' %}disabled{% endif %}>
                    <option value="">Seleccione Regla...</option>
                    {% for regla in reglas %}
                    <option value="{{ regla.id }}" {% if registro and registro.regla_id == regla.id %}selected{% endif %}>{{ regla.nombre }} ({{ regla.codigo }})</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-12 mt-3">
                <div class="alert alert-info border-0 bg-info-subtle small mb-0">
                    <i class="fa fa-info-circle me-1"></i>
                    La configuración avanzada de parámetros (JSON overrides) podrá ser editada desde un panel avanzado próximamente.
                </div>
            </div>
            <div class="col-md-12 mt-3">
                <div class="form-check form-switch">
                    <input class="form-check-input" type="checkbox" id="activo_regla_empresa" 
                           {% if registro is none or registro.activo %}checked{% endif %}
                           {% if modo == 'Visualizar' %}disabled{% endif %}>
                    <label class="form-check-label small fw-bold text-muted" for="activo_regla_empresa">Asignación Activa</label>
                </div>
            </div>
        </div>
    </form>
</div>

<div class="modal-footer bg-light border-top-0">
    <button type="button" class="btn btn-secondary" onclick="CerrarModal()">Cancelar</button>
    {% if modo != 'Visualizar' %}
    <button type="button" class="btn btn-primary px-4" onclick="guardarReglaEmpresa()">
        <i class="fa fa-save me-1"></i> Guardar Asignación
    </button>
    {% endif %}
</div>

<script>
function guardarReglaEmpresa() {
    const id         = $('#id_regla_empresa').val();
    const empresa_id = $('#empresa_id_regla').val();
    const regla_id   = $('#regla_id_regla').val();
    const activo     = $('#activo_regla_empresa').is(':checked');

    if (!empresa_id || !regla_id) { 
        toastr.warning('Complete todos los campos obligatorios (*).'); 
        return; 
    }

    $('#fondo').fadeIn();
    $.post("{{ url_for('regla_empresa.guardar') }}", { id, empresa_id, regla_id, activo: activo ? 'true' : 'false' })
        .done(res => {
            if (res.ok) {
                toastr.success(res.msg);
                CerrarModal();
                refreshTablaReglaEmpresa();
            } else {
                toastr.error(res.msg);
                $('#fondo').fadeOut();
            }
        })
        .fail(() => { toastr.error('Error de servidor al guardar.'); $('#fondo').fadeOut(); });
}
</script>
