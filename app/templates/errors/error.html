{% extends "layout.html" %}

{% block title %}Error {{ code }}{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-md-6 text-center">
        <div class="error-illustration mb-4">
            <i class="fa fa-exclamation-triangle text-warning" style="font-size: 5rem;"></i>
        </div>
        <h1 class="display-1 fw-bold text-dark">{{ code }}</h1>
        <h2 class="fw-bold mb-3">{{ msg }}</h2>
        <p class="text-muted mb-5 px-5">
            {{ desc }}
        </p>
        <div class="d-flex justify-content-center gap-3">
            <a href="{{ url_for('main.index') }}" class="btn btn-primary px-4 shadow-sm">
                <i class="fa fa-home me-1"></i> Ir al Inicio
            </a>
            <button onclick="window.history.back()" class="btn btn-outline-secondary px-4">
                <i class="fa fa-arrow-left me-1"></i> Volver atrás
            </button>
        </div>
        
        <div class="mt-5 pt-4 border-top">
            <small class="text-muted">Si el problema persiste, contacte a soporte@sgt.cl</small>
        </div>
    </div>
</div>
{% endblock %}
