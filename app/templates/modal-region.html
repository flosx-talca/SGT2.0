<div class="modal-header bg-primary text-white">
    <h5 class="modal-title fw-bold">
        {% if modo == 'Agregar' %}Nueva Región
        {% elif modo == 'Editar' %}Editar Región
        {% else %}Detalle de Región
        {% endif %}
    </h5>
    <button type="button" class="btn-close btn-close-white" onclick="CerrarModal()" aria-label="Close"></button>
</div>

<div class="modal-body p-4">
    <form id="form_region">
        <input type="hidden" id="id_region" value="{{ region.id if region else 0 }}">
        <div class="row g-3">
            <div class="col-md-4">
                <label class="form-label small fw-bold text-muted"><code>(*)</code> Código</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0"><i class="fa fa-barcode text-muted"></i></span>
                    <input type="text" class="form-control border-start-0 {% if modo == 'Visualizar' %}bg-light{% endif %}"
                           id="codigo_region"
                           value="{{ region.codigo if region else '' }}"
                           {% if modo == 'Visualizar' %}readonly{% endif %}
                           maxlength="10" required>
                </div>
            </div>

            <div class="col-md-8">
                <label class="form-label small fw-bold text-muted"><code>(*)</code> Descripción</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0"><i class="fa fa-map text-muted"></i></span>
                    <input type="text" class="form-control border-start-0 {% if modo == 'Visualizar' %}bg-light{% endif %}"
                           id="desc_region"
                           value="{{ region.descripcion if region else '' }}"
                           {% if modo == 'Visualizar' %}readonly{% endif %}
                           maxlength="150" required>
                </div>
            </div>

            <div class="col-md-12 mt-4">
                <div class="form-check form-switch">
                    <input class="form-check-input" type="checkbox" id="activo_region"
                           {% if region is none or region.activo %}checked{% endif %}
                           {% if modo == 'Visualizar' %}disabled{% endif %}>
                    <label class="form-check-label small fw-bold text-muted" for="activo_region">Región Activa</label>
                </div>
            </div>
        </div>
    </form>
</div>

<div class="modal-footer bg-light border-top-0">
    <button type="button" class="btn btn-secondary" onclick="CerrarModal()">Cancelar</button>
    {% if modo != 'Visualizar' %}
    <button type="button" class="btn btn-primary px-4" onclick="guardarRegion()">
        <i class="fa fa-save me-1"></i> Guardar Región
    </button>
    {% endif %}
</div>

<script>
    function guardarRegion() {
        const id          = $('#id_region').val();
        const codigo      = $('#codigo_region').val().trim();
        const descripcion = $('#desc_region').val().trim();
        const activo      = $('#activo_region').is(':checked') ? 'true' : 'false';

        if (!codigo || !descripcion) {
            toastr.warning('Código y Descripción son obligatorios.');
            return;
        }

        $('#fondo').addClass('visible');
        $.post("{{ url_for('region.guardar') }}", { id, codigo, descripcion, activo })
            .done(function(res) {
                if (res.ok) {
                    toastr.success(res.msg);
                    CerrarModal();
                    // Refresh parcial via HTMX: solo el tbody, sin recargar la página
                    refreshTablaRegiones();
                } else {
                    toastr.error(res.msg);
                    $('#fondo').removeClass('visible');
                }
            })
            .fail(function() {
                toastr.error('Error de comunicación con el servidor.');
                $('#fondo').removeClass('visible');
            });
    }
</script>
