<div class="modal-header bg-primary text-white">
    <h5 class="modal-title fw-bold">Región</h5>
    <button type="button" class="btn-close btn-close-white" onclick="CerrarModal()" aria-label="Close"></button>
</div>

<div class="modal-body p-4">
    <form id="form_region">
        <div class="row g-3">
            <div class="col-md-4">
                <label class="form-label small fw-bold text-muted"><code>(*)</code> Código</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0"><i class="fa fa-barcode text-muted"></i></span>
                    <input type="text" class="form-control border-start-0 bg-light" id="codigo_region" value="RM" readonly required>
                </div>
            </div>

            <div class="col-md-8">
                <label class="form-label small fw-bold text-muted"><code>(*)</code> Descripción</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0"><i class="fa fa-map text-muted"></i></span>
                    <input type="text" class="form-control border-start-0 bg-light" id="desc_region" value="Región Metropolitana de Santiago" readonly required>
                </div>
            </div>
            
            <div class="col-md-12 mt-4">
                <div class="form-check form-switch">
                    <input class="form-check-input" type="checkbox" id="activo_region" checked disabled>
                    <label class="form-check-label small fw-bold text-muted" for="activo_region">Región Activa</label>
                </div>
            </div>
        </div>
    </form>
</div>

<div class="modal-footer bg-light border-top-0">
    <button type="button" class="btn btn-secondary" onclick="CerrarModal()">Cancelar</button>
    <button type="button" class="btn btn-primary px-4" id="btn-guardar-region" onclick="guardarRegion()">
        <i class="fa fa-save me-1"></i> Guardar Región
    </button>
</div>

<script>
    function guardarRegion() {
        $('#fondo').fadeIn();
        setTimeout(() => {
            $('#fondo').fadeOut();
            toastr.success('Región guardada con éxito');
            CerrarModal();
        }, 800);
    }
    
    {% if modo == 'Agregar' %}
    $(document).ready(function() {
        $('.modal-title').text('Nueva Región');
        $('#codigo_region').val('').prop('readonly', false).removeClass('bg-light');
        $('#desc_region').val('').prop('readonly', false).removeClass('bg-light');
        $('#activo_region').prop('checked', true).prop('disabled', false);
    });
    {% elif modo == 'Visualizar' %}
    $(document).ready(function() {
        $('#btn-guardar-region').hide();
    });
    {% elif modo == 'Editar' %}
    $(document).ready(function() {
        $('.modal-title').text('Editar Región');
        $('#codigo_region').prop('readonly', false).removeClass('bg-light');
        $('#desc_region').prop('readonly', false).removeClass('bg-light');
        $('#activo_region').prop('disabled', false);
    });
    {% endif %}
</script>
