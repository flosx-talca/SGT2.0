<div class="modal-header bg-primary text-white">
    <h5 class="modal-title fw-bold">
        {% if modo == 'Agregar' %}<i class="fa fa-plus-circle me-2"></i>Nueva Comuna
        {% elif modo == 'Editar' %}<i class="fa fa-edit me-2"></i>Editar Comuna
        {% else %}<i class="fa fa-eye me-2"></i>Detalle de Comuna
        {% endif %}
    </h5>
    <button type="button" class="btn-close btn-close-white" onclick="CerrarModal()"></button>
</div>

<div class="modal-body p-4">
    <form id="form_comuna">
        <input type="hidden" id="id_comuna" value="{{ registro.id if registro else 0 }}">
        
        <div class="row g-3">
            <div class="col-md-4">
                <label class="form-label small fw-bold text-muted text-uppercase">Código <code>(*)</code></label>
                <input type="text" class="form-control {% if modo == 'Visualizar' %}bg-light{% endif %}" 
                       id="codigo_comuna" maxlength="20"
                       placeholder="Ej: COM-01"
                       value="{{ registro.codigo if registro else '' }}"
                       {% if modo == 'Visualizar' %}readonly{% endif %}>
            </div>
            
            <div class="col-md-8">
                <label class="form-label small fw-bold text-muted text-uppercase">Descripción <code>(*)</code></label>
                <input type="text" class="form-control {% if modo == 'Visualizar' %}bg-light{% endif %}" 
                       id="desc_comuna" maxlength="150"
                       placeholder="Nombre de la comuna"
                       value="{{ registro.descripcion if registro else '' }}"
                       {% if modo == 'Visualizar' %}readonly{% endif %}>
            </div>

            <div class="col-md-12">
                <label class="form-label small fw-bold text-muted text-uppercase">Región <code>(*)</code></label>
                <select id="region_id_comuna" class="form-select {% if modo == 'Visualizar' %}bg-light{% endif %}"
                        {% if modo == 'Visualizar' %}disabled{% endif %}>
                    <option value="">-- Seleccione una región --</option>
                    {% for reg in regiones %}
                    <option value="{{ reg.id }}" 
                            {% if registro and registro.region_id == reg.id %}selected{% endif %}>
                        {{ reg.descripcion }} ({{ reg.codigo }})
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div class="col-md-12">
                <div class="form-check form-switch mt-2">
                    <input class="form-check-input" type="checkbox" id="activo_comuna" 
                           {% if registro is none or registro.activo %}checked{% endif %}
                           {% if modo == 'Visualizar' %}disabled{% endif %}>
                    <label class="form-check-label fw-bold" for="activo_comuna">Comuna Activa</label>
                </div>
            </div>
        </div>
    </form>
</div>

<div class="modal-footer bg-light border-top-0">
    <button type="button" class="btn btn-secondary px-4" onclick="CerrarModal()">
        {{ 'Cerrar' if modo == 'Visualizar' else 'Cancelar' }}
    </button>
    
    {% if modo != 'Visualizar' %}
    <button type="button" class="btn btn-primary px-4" id="btnGuardarComuna" onclick="guardarComuna()">
        <i class="fa fa-save me-1"></i> Guardar Cambios
    </button>
    {% endif %}
</div>

<script>
function guardarComuna() {
    const id = $('#id_comuna').val();
    const codigo = $('#codigo_comuna').val().trim();
    const descripcion = $('#desc_comuna').val().trim();
    const region_id = $('#region_id_comuna').val();
    const activo = $('#activo_comuna').is(':checked') ? 'true' : 'false';

    if (!codigo || !descripcion || !region_id) {
        toastr.warning('Todos los campos marcados con (*) son obligatorios.');
        return;
    }

    // Deshabilitar botón para evitar doble envío
    const $btn = $('#btnGuardarComuna');
    $btn.prop('disabled', true).html('<i class="fa fa-spinner fa-spin me-1"></i> Guardando...');
    $('#fondo').addClass('visible');

    $.post("{{ url_for('comuna.guardar') }}", {
        id: id,
        codigo: codigo,
        descripcion: descripcion,
        region_id: region_id,
        activo: activo
    })
    .done(function(res) {
        if (res.ok) {
            toastr.success(res.msg);
            CerrarModal();
            refreshTablaComunas();
        } else {
            toastr.error(res.msg);
            $btn.prop('disabled', false).html('<i class="fa fa-save me-1"></i> Guardar Cambios');
        }
    })
    .fail(function(err) {
        toastr.error('Error de comunicación con el servidor.');
        $btn.prop('disabled', false).html('<i class="fa fa-save me-1"></i> Guardar Cambios');
    })
    .always(function() {
        $('#fondo').removeClass('visible');
    });
}
</script>
