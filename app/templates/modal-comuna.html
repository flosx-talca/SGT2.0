<div class="modal-header bg-primary text-white">
    <h5 class="modal-title fw-bold">Comuna</h5>
    <button type="button" class="btn-close btn-close-white" onclick="CerrarModal()" aria-label="Close"></button>
</div>

<div class="modal-body p-4">
    <form id="form_comuna">
        <div class="row g-3">
            <div class="col-md-4">
                <label class="form-label small fw-bold text-muted"><code>(*)</code> Código</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0"><i class="fa fa-barcode text-muted"></i></span>
                    <input type="text" class="form-control border-start-0 bg-light" id="codigo_comuna" value="13101" readonly required>
                </div>
            </div>

            <div class="col-md-8">
                <label class="form-label small fw-bold text-muted"><code>(*)</code> Descripción</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0"><i class="fa fa-map-pin text-muted"></i></span>
                    <input type="text" class="form-control border-start-0 bg-light" id="desc_comuna" value="Santiago" readonly required>
                </div>
            </div>

            <div class="col-md-12">
                <label class="form-label small fw-bold text-muted">Región Asociada</label>
                <select class="form-select bg-light" id="region_comuna" disabled>
                    <option value="" disabled>Seleccione una Región...</option>
                    <option value="RM" selected>RM - Región Metropolitana de Santiago</option>
                    <option value="V">V - Región de Valparaíso</option>
                    <option value="VIII">VIII - Región del Biobío</option>
                </select>
            </div>
            
            <div class="col-md-12 mt-4">
                <div class="form-check form-switch">
                    <input class="form-check-input" type="checkbox" id="activo_comuna" checked disabled>
                    <label class="form-check-label small fw-bold text-muted" for="activo_comuna">Comuna Activa</label>
                </div>
            </div>
        </div>
    </form>
</div>

<div class="modal-footer bg-light border-top-0">
    <button type="button" class="btn btn-secondary" onclick="CerrarModal()">Cancelar</button>
    <button type="button" class="btn btn-primary px-4" id="btn-guardar-comuna" onclick="guardarComuna()">
        <i class="fa fa-save me-1"></i> Guardar Comuna
    </button>
</div>

<script>
    function guardarComuna() {
        $('#fondo').addClass('visible');
        setTimeout(() => {
            $('#fondo').removeClass('visible');
            toastr.success('Comuna guardada con éxito');
            CerrarModal();
        }, 800);
    }
    
    {% if modo == 'Agregar' %}
    $(document).ready(function() {
        $('.modal-title').text('Nueva Comuna');
        $('#codigo_comuna').val('').prop('readonly', false).removeClass('bg-light');
        $('#desc_comuna').val('').prop('readonly', false).removeClass('bg-light');
        $('#region_comuna').val('').prop('disabled', false).removeClass('bg-light');
        $('#activo_comuna').prop('checked', true).prop('disabled', false);
    });
    {% elif modo == 'Visualizar' %}
    $(document).ready(function() {
        $('#btn-guardar-comuna').hide();
    });
    {% elif modo == 'Editar' %}
    $(document).ready(function() {
        $('.modal-title').text('Editar Comuna');
        $('#codigo_comuna').prop('readonly', false).removeClass('bg-light');
        $('#desc_comuna').prop('readonly', false).removeClass('bg-light');
        $('#region_comuna').prop('disabled', false).removeClass('bg-light');
        $('#activo_comuna').prop('disabled', false);
    });
    {% endif %}
</script>
