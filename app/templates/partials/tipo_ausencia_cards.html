{% for ta in registros %}
<div class="col-md-4 col-lg-3 p-2">
    <div class="card h-100 shadow-sm border-0 position-relative {% if not ta.activo %}opacity-50{% endif %}">
        <div class="card-body">
            <div class="d-flex justify-content-between align-items-start mb-2">
                <span class="badge" style="background-color: {{ ta.color }};">{{ ta.abreviacion }}</span>
                <div class="dropdown">
                    <button class="btn btn-link text-muted p-0" data-bs-toggle="dropdown"><i class="fa fa-ellipsis-v"></i></button>
                    <ul class="dropdown-menu dropdown-menu-end shadow-sm">
                        <li><a class="dropdown-item" href="#" onclick="Modal('Editar', {{ ta.id }}, '{{ url_for('tipo_ausencia.modal') }}')"><i class="fa fa-edit text-primary me-2"></i> Editar</a></li>
                        {% if ta.activo %}
                        <li><a class="dropdown-item text-danger" href="#" onclick="eliminarAusencia({{ ta.id }}, '{{ ta.nombre }}')"><i class="fa fa-trash me-2"></i> Desactivar</a></li>
                        {% endif %}
                    </ul>
                </div>
            </div>
            <h6 class="fw-bold mb-1">{{ ta.nombre }}</h6>
            <small class="text-muted d-block"><i class="fa fa-building me-1"></i> {{ ta.empresa.razon_social }}</small>
            {% if not ta.activo %}
            <span class="badge bg-secondary mt-2">Inactivo</span>
            {% endif %}
        </div>
    </div>
</div>
{% else %}
<div class="col-12 text-center py-5 text-muted">
    <i class="fa fa-folder-open fa-3x mb-3 opacity-25"></i>
    <p class="mb-0">No hay tipos de ausencia configurados.</p>
</div>
{% endfor %}
