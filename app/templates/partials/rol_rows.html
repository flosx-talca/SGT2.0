{% for r in registros %}
<tr>
    <td class="fw-bold text-primary">{{ r.descripcion }}</td>
    <td>
        <span class="badge bg-{{ 'success' if r.activo else 'danger' }}-subtle 
                         text-{{ 'success' if r.activo else 'danger' }} 
                         border border-{{ 'success' if r.activo else 'danger' }}">
            {{ 'Activo' if r.activo else 'Inactivo' }}
        </span>
    </td>
    <td class="text-center">
        <div class="btn-group btn-group-sm">
            <button class="btn btn-outline-info" title="Ver"
                onclick="Modal('Visualizar', {{ r.id }}, '{{ url_for('rol.modal') }}')">
                <i class="fa fa-eye"></i>
            </button>
            <button class="btn btn-outline-warning" title="Editar"
                onclick="Modal('Editar', {{ r.id }}, '{{ url_for('rol.modal') }}')">
                <i class="fa fa-edit"></i>
            </button>
            <button class="btn btn-outline-danger" title="Desactivar"
                onclick="eliminarRol({{ r.id }}, '{{ r.descripcion }}')">
                <i class="fa fa-ban"></i>
            </button>
        </div>
    </td>
</tr>
{% endfor %}
