{% for r in registros %}
<tr>
    <td class="fw-bold">{{ r.fecha.strftime('%d/%m/%Y') }}</td>
    <td>{{ r.descripcion }}</td>
    <td>
        {% if r.es_regional %}
        <span class="badge bg-info-subtle text-info border border-info">
            Regional ({{ r.region.descripcion if r.region else 'Sin región' }})
        </span>
        {% else %}
        <span class="badge bg-secondary-subtle text-secondary border border-secondary">Nacional</span>
        {% endif %}
    </td>
    <td>
        <span class="badge bg-{{ 'success' if r.activo else 'danger' }}-subtle 
                         text-{{ 'success' if r.activo else 'danger' }} 
                         border border-{{ 'success' if r.activo else 'danger' }}">
            {{ 'Activo' if r.activo else 'Inactivo' }}
        </span>
    </td>
    <td class="text-center">
        <div class="btn-group btn-group-sm">
            <button class="btn btn-outline-info" title="Ver"
                onclick="Modal('Visualizar', {{ r.id }}, '{{ url_for('feriado.modal') }}')">
                <i class="fa fa-eye"></i>
            </button>
            <button class="btn btn-outline-warning" title="Editar"
                onclick="Modal('Editar', {{ r.id }}, '{{ url_for('feriado.modal') }}')">
                <i class="fa fa-edit"></i>
            </button>
            <button class="btn btn-outline-danger" title="Desactivar"
                onclick="eliminarFeriado({{ r.id }}, '{{ r.descripcion }}')">
                <i class="fa fa-ban"></i>
            </button>
        </div>
    </td>
</tr>
{% endfor %}
