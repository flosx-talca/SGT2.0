<div class="modal-header bg-primary text-white">
    <h5 class="modal-title fw-bold">
        {% if modo == 'Agregar' %}Nueva Ficha de Trabajador
        {% elif modo == 'Editar' %}Editar Trabajador
        {% else %}Detalle de Trabajador
        {% endif %}
    </h5>
    <button type="button" class="btn-close btn-close-white" onclick="CerrarModal()"></button>
</div>

<div class="modal-body p-4">
    <form id="form_trabajador">
        <input type="hidden" id="id_trabajador" value="{{ registro.id if registro else 0 }}">
        
        <div class="row g-3">
            <!-- Datos Personales -->
            <div class="col-md-4">
                <label class="form-label small fw-bold text-muted"><code>(*)</code> RUT</label>
                <input type="text" class="form-control shadow-sm {% if modo == 'Visualizar' %}bg-light{% endif %}" 
                       id="rut_trabajador" value="{{ registro.rut if registro else '' }}"
                       {% if modo == 'Visualizar' %}readonly{% endif %} placeholder="12.345.678-9">
            </div>

            <div class="col-md-8">
                <label class="form-label small fw-bold text-muted"><code>(*)</code> Nombres</label>
                <input type="text" class="form-control shadow-sm {% if modo == 'Visualizar' %}bg-light{% endif %}" 
                       id="nombre_trabajador" value="{{ registro.nombre if registro else '' }}"
                       {% if modo == 'Visualizar' %}readonly{% endif %}>
            </div>

            <div class="col-md-6">
                <label class="form-label small fw-bold text-muted"><code>(*)</code> Apellido Paterno</label>
                <input type="text" class="form-control shadow-sm {% if modo == 'Visualizar' %}bg-light{% endif %}" 
                       id="apellido1_trabajador" value="{{ registro.apellido1 if registro else '' }}"
                       {% if modo == 'Visualizar' %}readonly{% endif %}>
            </div>

            <div class="col-md-6">
                <label class="form-label small fw-bold text-muted">Apellido Materno</label>
                <input type="text" class="form-control shadow-sm {% if modo == 'Visualizar' %}bg-light{% endif %}" 
                       id="apellido2_trabajador" value="{{ registro.apellido2 if registro else '' }}"
                       {% if modo == 'Visualizar' %}readonly{% endif %}>
            </div>

            <!-- Datos Laborales -->
            <div class="col-md-6">
                <label class="form-label small fw-bold text-muted"><code>(*)</code> Empresa / Sucursal</label>
                <select id="empresa_id_trabajador" class="form-select shadow-sm {% if modo == 'Visualizar' %}bg-light{% endif %}"
                        {% if modo == 'Visualizar' %}disabled{% endif %}>
                    <option value="">-- Seleccione Empresa --</option>
                    {% for e in empresas %}
                    <option value="{{ e.id }}" {% if registro and registro.empresa_id == e.id %}selected{% endif %}>
                        {{ e.razon_social }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div class="col-md-6">
                <label class="form-label small fw-bold text-muted"><code>(*)</code> Servicio / Área</label>
                <select id="servicio_id_trabajador" class="form-select shadow-sm {% if modo == 'Visualizar' %}bg-light{% endif %}"
                        {% if modo == 'Visualizar' %}disabled{% endif %}>
                    <option value="">-- Seleccione Servicio --</option>
                    {% for s in servicios %}
                    <option value="{{ s.id }}" {% if registro and registro.servicio_id == s.id %}selected{% endif %}>
                        {{ s.descripcion }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div class="col-md-12">
                <label class="form-label small fw-bold text-muted">Cargo / Función</label>
                <input type="text" class="form-control shadow-sm {% if modo == 'Visualizar' %}bg-light{% endif %}" 
                       id="cargo_trabajador" value="{{ registro.cargo if registro else '' }}"
                       {% if modo == 'Visualizar' %}readonly{% endif %} placeholder="Ej: Operario, Supervisor, etc.">
            </div>

            <div class="col-md-6">
                <label class="form-label small fw-bold text-muted">Email</label>
                <input type="email" class="form-control shadow-sm {% if modo == 'Visualizar' %}bg-light{% endif %}" 
                       id="email_trabajador" value="{{ registro.email if registro else '' }}"
                       {% if modo == 'Visualizar' %}readonly{% endif %}>
            </div>

            <div class="col-md-6">
                <label class="form-label small fw-bold text-muted">Teléfono</label>
                <input type="text" class="form-control shadow-sm {% if modo == 'Visualizar' %}bg-light{% endif %}" 
                       id="telefono_trabajador" value="{{ registro.telefono if registro else '' }}"
                       {% if modo == 'Visualizar' %}readonly{% endif %}>
            </div>

            <div class="col-md-6">
                <label class="form-label small fw-bold text-muted">Tipo de Contrato</label>
                <select id="tipo_contrato_trabajador" class="form-select shadow-sm {% if modo == 'Visualizar' %}bg-light{% endif %}"
                        {% if modo == 'Visualizar' %}disabled{% endif %}>
                    <option value="full-time" {% if registro and registro.tipo_contrato == 'full-time' %}selected{% endif %}>Full Time</option>
                    <option value="part-time" {% if registro and registro.tipo_contrato == 'part-time' %}selected{% endif %}>Part Time</option>
                    <option value="honorarios" {% if registro and registro.tipo_contrato == 'honorarios' %}selected{% endif %}>Honorarios</option>
                </select>
            </div>

            <div class="col-md-6">
                <label class="form-label small fw-bold text-muted">Horas Semanales</label>
                <input type="number" class="form-control shadow-sm {% if modo == 'Visualizar' %}bg-light{% endif %}" 
                       id="horas_trabajador" value="{{ registro.horas_semanales if registro else 45 }}"
                       {% if modo == 'Visualizar' %}readonly{% endif %}>
            </div>

            <div class="col-md-12 mt-3 text-end">
                <div class="form-check form-switch d-inline-block">
                    <input class="form-check-input" type="checkbox" id="activo_trabajador" 
                           {% if registro is none or registro.activo %}checked{% endif %}
                           {% if modo == 'Visualizar' %}disabled{% endif %}>
                    <label class="form-check-label fw-bold text-muted ms-2" for="activo_trabajador">Trabajador Activo</label>
                </div>
            </div>
        </div>
    </form>
</div>

<div class="modal-footer bg-light border-top-0">
    <button type="button" class="btn btn-secondary" onclick="CerrarModal()">Cancelar</button>
    {% if modo != 'Visualizar' %}
    <button type="button" id="btnGuardarTrabajador" class="btn btn-primary px-4 shadow-sm" onclick="guardarTrabajador()">
        <i class="fa fa-save me-1"></i> Guardar Ficha
    </button>
    {% endif %}
</div>

<script>
function guardarTrabajador() {
    const id = $('#id_trabajador').val();
    const rut = $('#rut_trabajador').val().trim();
    const nombre = $('#nombre_trabajador').val().trim();
    const apellido1 = $('#apellido1_trabajador').val().trim();
    const apellido2 = $('#apellido2_trabajador').val().trim();
    const empresa_id = $('#empresa_id_trabajador').val();
    const servicio_id = $('#servicio_id_trabajador').val();
    const cargo = $('#cargo_trabajador').val().trim();
    const email = $('#email_trabajador').val().trim();
    const telefono = $('#telefono_trabajador').val().trim();
    const tipo_contrato = $('#tipo_contrato_trabajador').val();
    const horas = $('#horas_trabajador').val();
    const activo = $('#activo_trabajador').is(':checked');

    if (!rut || !nombre || !apellido1 || !empresa_id || !servicio_id) {
        toastr.warning('Faltan campos obligatorios (*).');
        return;
    }

    const $btn = $('#btnGuardarTrabajador');
    $btn.prop('disabled', true).html('<i class="fa fa-spinner fa-spin me-1"></i> Guardando...');
    $('#fondo').addClass('visible');

    $.post("{{ url_for('trabajador.guardar') }}", {
        id: id,
        rut: rut,
        nombre: nombre,
        apellido1: apellido1,
        apellido2: apellido2,
        empresa_id: empresa_id,
        servicio_id: servicio_id,
        cargo: cargo,
        email: email,
        telefono: telefono,
        tipo_contrato: tipo_contrato,
        horas_semanales: horas,
        activo: activo ? 'true' : 'false'
    })
    .done(function(res) {
        if (res.ok) {
            toastr.success(res.msg);
            CerrarModal();
            if (typeof refreshTablaTrabajadores === 'function') refreshTablaTrabajadores();
        } else {
            toastr.error(res.msg);
            $btn.prop('disabled', false).html('<i class="fa fa-save me-1"></i> Guardar Ficha');
        }
    })
    .fail(function() {
        toastr.error('Error de comunicación con el servidor.');
        $btn.prop('disabled', false).html('<i class="fa fa-save me-1"></i> Guardar Ficha');
    })
    .always(function() {
        $('#fondo').removeClass('visible');
    });
}
</script>
