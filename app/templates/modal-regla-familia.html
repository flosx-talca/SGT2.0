<div class="modal-header bg-primary text-white">
    <h5 class="modal-title fw-bold">Familia de Reglas</h5>
    <button type="button" class="btn-close btn-close-white" onclick="CerrarModal()" aria-label="Close"></button>
</div>

<div class="modal-body p-4">
    <form id="form_regla_familia">
        <!-- Banner Informativo -->
        <div class="alert alert-info border-0 shadow-sm mb-4">
            <div class="d-flex align-items-center">
                <i class="fa fa-sitemap fa-2x me-3 opacity-50"></i>
                <div>
                    <h6 class="fw-bold mb-1">Gestión de Motor Genérico</h6>
                    <p class="mb-0 small">Estás visualizando/editando la lógica base de una familia de evaluación.</p>
                </div>
            </div>
        </div>

        <div class="row g-3">
            <div class="col-md-6">
                <label class="form-label small fw-bold text-muted"><code>(*)</code> Código de Familia</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0"><i class="fa fa-code text-muted"></i></span>
                    <input type="text" class="form-control border-start-0 bg-light" id="codigo_familia" value="comparison" readonly required>
                </div>
            </div>

            <div class="col-md-6">
                <label class="form-label small fw-bold text-muted"><code>(*)</code> Función Genérica (Python)</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0"><i class="fa fa-terminal text-muted"></i></span>
                    <input type="text" class="form-control border-start-0 bg-light" id="funcion_generica" value="eval_comparison" readonly required>
                </div>
            </div>
            
            <div class="col-md-12">
                <label class="form-label small fw-bold text-muted"><code>(*)</code> Descripción de la Lógica</label>
                <textarea class="form-control bg-light" id="desc_familia" rows="2" readonly required>Compara valores con umbrales (==, !=, >, <)</textarea>
            </div>

            <div class="col-md-12">
                <label class="form-label small fw-bold text-muted">Estado del Motor</label>
                <select class="form-select" id="estado_familia">
                    <option value="core" selected>Core (Sistema Base)</option>
                    <option value="custom">Custom (Personalizado)</option>
                    <option value="inactivo">Inactivo</option>
                </select>
            </div>
        </div>
    </form>
</div>

<div class="modal-footer bg-light border-top-0">
    <button type="button" class="btn btn-secondary" onclick="CerrarModal()">Cancelar</button>
    <button type="button" class="btn btn-primary px-4" id="btn-guardar-familia" onclick="guardarReglaFamilia()">
        <i class="fa fa-save me-1"></i> Guardar Familia
    </button>
</div>

<script>
    function guardarReglaFamilia() {
        // Simulación de guardado
        $('#fondo').addClass('visible');
        setTimeout(() => {
            $('#fondo').removeClass('visible');
            toastr.success('Familia de reglas guardada con éxito');
            CerrarModal();
        }, 800);
    }
    
    // Lógica dinámica según el modo recibido desde Flask
    {% if modo == 'Agregar' %}
    $(document).ready(function() {
        $('.modal-title').text('Nueva Familia de Reglas');
        $('#codigo_familia').val('').prop('readonly', false).removeClass('bg-light');
        $('#funcion_generica').val('').prop('readonly', false).removeClass('bg-light');
        $('#desc_familia').val('').prop('readonly', false).removeClass('bg-light');
        $('#estado_familia').val('custom');
    });
    {% elif modo == 'Visualizar' %}
    $(document).ready(function() {
        $('#form_regla_familia input, #form_regla_familia select, #form_regla_familia textarea').prop('disabled', true);
        $('#btn-guardar-familia').hide();
    });
    {% endif %}
</script>
