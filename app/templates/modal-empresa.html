<div class="modal-header bg-primary text-white">
<h5 class="modal-title fw-bold">(Demo) Empresa</h5>
<button aria-label="Close" class="btn-close btn-close-white" onclick="CerrarModal()" type="button"></button>
</div>
<div class="modal-body p-4">
<form id="form_empresa">
<input id="id_empresa" name="id_empresa" type="hidden" value="0"/>
<div class="row g-3">
<div class="col-md-6">
<label class="form-label small fw-bold text-muted"><code>(*)</code> RUT</label>
<div class="input-group">
<span class="input-group-text bg-light border-end-0"><i class="fa fa-id-card text-muted"></i></span>
<input class="form-control border-start-0" id="rut_empresa" name="rut" placeholder="76.543.210-K" required="" type="text" value=""/>
</div>
</div>
<div class="col-md-6">
<label class="form-label small fw-bold text-muted"><code>(*)</code> Razón Social</label>
<div class="input-group">
<span class="input-group-text bg-light border-end-0"><i class="fa fa-building text-muted"></i></span>
<input class="form-control border-start-0" id="razon_social" name="razon_social" placeholder="Ej: Inversiones ABC SpA" required="" type="text" value=""/>
</div>
</div>
<div class="col-md-12">
<label class="form-label small fw-bold text-muted"><code>(*)</code> Cliente Asociado</label>
<select class="form-select select2-modal" id="cliente_id" name="cliente_id" required="">
<option value="">Seleccione un cliente...</option>
<option value="1">Ricardo Soto Mayor (Petroleum)</option>
<option value="2">Claudia Herrera Lynch (Retail)</option>
<option value="3">Inversiones Delta</option>
</select>
</div>
<div class="col-12">
<label class="form-label small fw-bold text-muted"><code>(*)</code> Dirección</label>
<div class="input-group">
<span class="input-group-text bg-light border-end-0"><i class="fa fa-map-marker-alt text-muted"></i></span>
<input class="form-control border-start-0" id="direccion" name="direccion" placeholder="Av. Alameda 1234, Santiago" required="" type="text" value=""/>
</div>
</div>
<div class="col-md-6">
<label class="form-label small fw-bold text-muted">Estado</label>
<select class="form-select" id="estado_empresa" name="estado">
<option selected="" value="1">Activo</option>
<option value="0">Inactivo</option>
</select>
</div>
<div class="col-md-6">
<label class="form-label small fw-bold text-muted">Secciones o Áreas</label>
<select class="form-select" id="secciones_empresa" multiple="" name="secciones[]" size="3">
<!-- Mock Sections -->
<option value="gasolinera">Gasolinera (Pista)</option>
<option value="pronto">Tienda Pronto</option>
<option value="sala_venta">Sala de Ventas</option>
<option value="lavado">Servicio de Lavado</option>
<option value="oficina">Administración / Oficina</option>
</select>
<div class="form-text small text-muted">Mantenga Ctrl o Cmd para seleccionar múltiples opciones.</div>
</div>
</div>
</form>
</div>
<div class="modal-footer bg-light border-top-0">
<button class="btn btn-secondary" onclick="CerrarModal()" type="button">
<i class="fa fa-times me-1"></i> Cerrar
    </button>
<button class="btn btn-primary" id="btnGuardarEmpresa" onclick="guardarEmpresa()" type="button">
<i class="fa fa-save me-1"></i> Guardar
    </button>
</div>
<script>
function guardarEmpresa() {
    Swal.fire({
        title: '¿Guardar Empresa?',
        text: "Modo Prototipo Estático: Los datos no se guardarán en BD.",
        icon: 'info',
        showCancelButton: true,
        confirmButtonColor: '#18bc9c',
        cancelButtonColor: '#d33',
        confirmButtonText: 'Simular Guardado'
    }).then((result) => {
        if (result.isConfirmed) {
            toastr.success('Empresa guardada exitosamente (Simulación).');
            CerrarModal();
        }
    });
}
</script>
