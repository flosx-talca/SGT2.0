<div class="modal-header bg-primary text-white">
    <h5 class="modal-title fw-bold">Rol</h5>
    <button type="button" class="btn-close btn-close-white" onclick="CerrarModal()" aria-label="Close"></button>
</div>

<div class="modal-body p-4">
    <form id="form_rol">
        <div class="row g-3">
            <div class="col-md-12">
                <label class="form-label small fw-bold text-muted"><code>(*)</code> Descripción del Rol</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0"><i class="fa fa-id-badge text-muted"></i></span>
                    <input type="text" class="form-control border-start-0 bg-light" id="desc_rol" value="Super Admin" readonly required>
                </div>
            </div>
            
            <div class="col-md-12 mt-4">
                <div class="form-check form-switch">
                    <input class="form-check-input" type="checkbox" id="activo_rol" checked disabled>
                    <label class="form-check-label small fw-bold text-muted" for="activo_rol">Rol Activo</label>
                </div>
            </div>
        </div>
    </form>
</div>

<div class="modal-footer bg-light border-top-0">
    <button type="button" class="btn btn-secondary" onclick="CerrarModal()">Cancelar</button>
    <button type="button" class="btn btn-primary px-4" id="btn-guardar-rol" onclick="guardarRol()">
        <i class="fa fa-save me-1"></i> Guardar Rol
    </button>
</div>

<script>
    function guardarRol() {
        $('#fondo').fadeIn();
        setTimeout(() => {
            $('#fondo').fadeOut();
            toastr.success('Rol guardado con éxito');
            CerrarModal();
        }, 800);
    }
    
    {% if modo == 'Agregar' %}
    $(document).ready(function() {
        $('.modal-title').text('Nuevo Rol');
        $('#desc_rol').val('').prop('readonly', false).removeClass('bg-light');
        $('#activo_rol').prop('checked', true).prop('disabled', false);
    });
    {% elif modo == 'Visualizar' %}
    $(document).ready(function() {
        $('#btn-guardar-rol').hide();
    });
    {% elif modo == 'Editar' %}
    $(document).ready(function() {
        $('.modal-title').text('Editar Rol');
        $('#desc_rol').prop('readonly', false).removeClass('bg-light');
        $('#activo_rol').prop('disabled', false);
    });
    {% endif %}
</script>
