<div class="modal-header bg-primary text-white">
    <h5 class="modal-title fw-bold">Menú</h5>
    <button type="button" class="btn-close btn-close-white" onclick="CerrarModal()" aria-label="Close"></button>
</div>

<div class="modal-body p-4">
    <form id="form_menu">
        <div class="row g-3">
            <div class="col-md-4">
                <label class="form-label small fw-bold text-muted"><code>(*)</code> Nombre del Menú</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0"><i class="fa fa-list text-muted"></i></span>
                    <input type="text" class="form-control border-start-0 bg-light" id="nombre_menu" value="Dashboard" readonly required>
                </div>
            </div>

            <div class="col-md-8">
                <label class="form-label small fw-bold text-muted"><code>(*)</code> Descripción</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0"><i class="fa fa-info-circle text-muted"></i></span>
                    <input type="text" class="form-control border-start-0 bg-light" id="desc_menu" value="Vista principal de indicadores y métricas" readonly required>
                </div>
            </div>
            
            <div class="col-md-12 mt-4">
                <div class="form-check form-switch">
                    <input class="form-check-input" type="checkbox" id="activo_menu" checked disabled>
                    <label class="form-check-label small fw-bold text-muted" for="activo_menu">Menú Activo</label>
                </div>
            </div>
        </div>
    </form>
</div>

<div class="modal-footer bg-light border-top-0">
    <button type="button" class="btn btn-secondary" onclick="CerrarModal()">Cancelar</button>
    <button type="button" class="btn btn-primary px-4" id="btn-guardar-menu" onclick="guardarMenu()">
        <i class="fa fa-save me-1"></i> Guardar Menú
    </button>
</div>

<script>
    function guardarMenu() {
        $('#fondo').fadeIn();
        setTimeout(() => {
            $('#fondo').fadeOut();
            toastr.success('Menú guardado con éxito');
            CerrarModal();
        }, 800);
    }
    
    {% if modo == 'Agregar' %}
    $(document).ready(function() {
        $('.modal-title').text('Nuevo Menú');
        $('#nombre_menu').val('').prop('readonly', false).removeClass('bg-light');
        $('#desc_menu').val('').prop('readonly', false).removeClass('bg-light');
        $('#activo_menu').prop('checked', true).prop('disabled', false);
    });
    {% elif modo == 'Visualizar' %}
    $(document).ready(function() {
        $('#btn-guardar-menu').hide();
    });
    {% elif modo == 'Editar' %}
    $(document).ready(function() {
        $('.modal-title').text('Editar Menú');
        $('#nombre_menu').prop('readonly', false).removeClass('bg-light');
        $('#desc_menu').prop('readonly', false).removeClass('bg-light');
        $('#activo_menu').prop('disabled', false);
    });
    {% endif %}
</script>
