<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGT 2.1 - Iniciar Sesión</title>
    <!-- Bootswatch CSS (Local) -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap.css') }}">
    <!-- Font Awesome 6.4.2 -->
    <link rel="stylesheet" href="{{ url_for('static', filename='vendor/all.min.css') }}">
    <!-- Toastr & SweetAlert2 -->
    <link rel="stylesheet" href="{{ url_for('static', filename='vendor/toastr.min.css') }}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11.26.24/dist/sweetalert2.min.css">
    
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>
<body>
    <div id="loader">
        <div class="text-center">
            <div class="spinner-border text-primary" style="width: 3rem; height: 3rem;" role="status"></div>
            <p class="mt-2 fw-bold text-primary">Validando credenciales...</p>
        </div>
    </div>

    <div class="login-card">
        <div class="login-header">
            <i class="fa fa-gas-pump"></i>
            <h3 class="fw-bold mb-0">SGT 2.1</h3>
            <p class="mb-0 small opacity-75">Sistema de Gestión de Turnos</p>
        </div>
        <div class="login-body">
            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label small fw-bold text-muted">USUARIO / RUT</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light text-muted border-end-0"><i class="fa fa-user"></i></span>
                        <input type="text" class="form-control border-start-0" id="usuario" name="usuario" placeholder="Ingrese su RUT" required>
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label small fw-bold text-muted">CONTRASEÑA</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light text-muted border-end-0"><i class="fa fa-lock"></i></span>
                        <input type="password" class="form-control border-start-0" id="password" name="password" placeholder="••••••••" required>
                    </div>
                </div>
                <div class="d-grid">
                    <button type="submit" class="btn btn-primary btn-login">
                        Acceder al Sistema <i class="fa fa-arrow-right ms-2"></i>
                    </button>
                </div>
            </form>
            <div class="text-center mt-4">
                <a href="#" class="text-decoration-none small text-muted" onclick="toastr.info('Contacte al administrador para recuperar su clave')">¿Olvidó su contraseña?</a>
            </div>
        </div>
        <div class="login-footer py-3 bg-light text-center border-top">
            <small class="text-muted">&copy; 2025 - Desarrollado por Flosx</small>
        </div>
    </div>

    <!-- SCRIPTS -->
    <script src="{{ url_for('static', filename='vendor/jquery-3.7.0.min.js') }}"></script>
    <script src="{{ url_for('static', filename='vendor/bootstrap.bundle.min.js') }}"></script>
    <script src="{{ url_for('static', filename='vendor/toastr.min.js') }}"></script>
    <script src="{{ url_for('static', filename='vendor/sweetalert2@11.js') }}"></script>

    <script>
        $(document).ready(function() {
            // Ocultar spinner al cargar la página
            $('#fondo').fadeOut(300);

            // Mostrar spinner al iniciar sesión
            $('form').on('submit', function() {
                $('#fondo').fadeIn(200);
            });
        });

        $(document).ready(function() {
            $('#loginForm').on('submit', function(e) {
                e.preventDefault();
                
                const user = $('#usuario').val();
                const pass = $('#password').val();

                $('#loader').css('display', 'flex');

                // Simulación de validación para el prototipo
                setTimeout(() => {
                    $('#loader').hide();
                    if((user === 'admin' && pass === '1234') || (user === '11111111-7' && pass === '1234')) {
                        toastr.success('Bienvenido al sistema');
                        setTimeout(() => {
                            window.location.href = "{{ url_for('index') }}";
                        }, 500);
                    } else {
                        Swal.fire({
                            title: 'Error de Acceso',
                            text: 'Usuario o contraseña incorrectos',
                            icon: 'error',
                            confirmButtonText: 'Reintentar',
                            confirmButtonColor: '#18bc9c'
                        });
                    }
                }, 1000);
            });
        });
    </script>

            </body>
            
</html>
